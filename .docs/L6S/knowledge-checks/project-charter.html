  <script>
    window.KC_DATA = {
      title: "Project Charter",
      subtitle: "One-page contract that aligns sponsor, lead, scope, success metric, timeline, and team before improvement work begins.",
      sourceFile: "../project-charter.md",
      sourceLabel: "project-charter.md",
      passingScore: 80,
      questions: [
        {
          prompt: "What is the most common improvement-project failure that a Project Charter prevents?",
          options: [
            "Insufficient budget for the project.",
            "Scope drift &mdash; &ldquo;while we&rsquo;re in there, can we also&hellip;&rdquo; requests.",
            "Slow approval from leadership.",
            "Lack of technical talent on the team."
          ],
          correctIndex: 1,
          explanation: "The charter forces explicit problem statement, goal, and scope <em>before</em> work starts and locks sponsor commitment with a signature. It is the answer to <strong>scope drift</strong> later."
        },
        {
          prompt: "Which item is essential to include in the charter &mdash; even if the team wants to skip it?",
          options: [
            "Branding guidelines and slide templates.",
            "Explicit Out-of-Scope items (at least three).",
            "A historical timeline of every prior attempt.",
            "Email addresses of every individual stakeholder."
          ],
          correctIndex: 1,
          explanation: "Explicit <strong>exclusions are as important as inclusions</strong>. They prevent &ldquo;while we&rsquo;re here&rdquo; scope creep and make the boundaries enforceable months later when new requests arrive."
        },
        {
          prompt: "Which is an anti-pattern when writing the problem statement on a charter?",
          options: [
            "Stating the magnitude (size, frequency, when it started).",
            "Linking the business case to COPQ.",
            "Naming the solution in the problem statement &mdash; e.g., &ldquo;Deploy ArgoCD to improve deploys.&rdquo;",
            "Tying the goal to a CTQ."
          ],
          correctIndex: 2,
          explanation: "Naming a solution <strong>prejudges Analyze</strong>. Restate as the problem (&ldquo;deploys take too long &mdash; mean 47 min vs. target 10 min&rdquo;) and let DMAIC find the right countermeasure."
        },
        {
          prompt: "When is a Project Charter typically overkill?",
          options: [
            "DMAIC Define phase.",
            "Kaizen events lasting 3+ days.",
            "A same-day fix or a standalone PDCA cycle by a single engineer.",
            "Belt certification projects (Green/Black)."
          ],
          correctIndex: 2,
          explanation: "Charters are mandatory for DMAIC, Kaizen pre-work, and cross-team projects. They are <strong>overkill for same-day fixes</strong> and solo PDCA cycles &mdash; ceremony should match scale."
        },
        {
          prompt: "Why do signatures (sponsor, lead, process owner) matter on a charter?",
          options: [
            "They satisfy a compliance audit requirement.",
            "Without them the charter is a wish list &mdash; signatures lock sponsor commitment and unblock the team to spend cycles.",
            "They&rsquo;re needed to publish to the company intranet.",
            "They prove the team read the document."
          ],
          correctIndex: 1,
          explanation: "Signatures convert a draft into a <strong>commitment</strong>. The sponsor agrees to clear blockers; the lead owns delivery; the process owner accepts the controlled process. Without these, the charter is decoration."
        }
      ]
    };
  </script>
