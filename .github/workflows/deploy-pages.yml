name: Deploy knowledge checks to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - ".docs/L6S/knowledge-checks/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload knowledge-checks artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .docs/L6S/knowledge-checks

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
