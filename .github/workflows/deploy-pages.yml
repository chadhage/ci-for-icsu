name: Deploy CI site to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - ".docs/L6S/knowledge-checks/**"
      - ".docs/microsite/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Assemble site
        run: |
          mkdir -p _site
          # Knowledge checks stay at the site root so existing links keep working
          cp -R .docs/L6S/knowledge-checks/. _site/
          # Microsite is published under /microsite/
          mkdir -p _site/microsite
          cp -R .docs/microsite/. _site/microsite/

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
